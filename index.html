<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="膝丸">
  <title>Hizamaru Companion</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --accent: #c8a96e;
      --red: #c84a4a;
      --text: #e8e0d0;
      --dim: #6a6050;
      --glow: rgba(200,169,110,0.25);
    }

    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: 'Georgia', 'Times New Roman', serif;
    }

    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(200,169,110,.025) 59px, rgba(200,169,110,.025) 60px),
        repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(200,169,110,.025) 59px, rgba(200,169,110,.025) 60px);
    }

    /* ── INIT OVERLAY ── */
    #overlay {
      position: fixed; inset: 0; z-index: 999;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      transition: opacity .8s ease;
    }
    #overlay.fade { opacity: 0; pointer-events: none; }

    .ol-kanji { font-size: 80px; color: var(--accent); text-shadow: 0 0 60px var(--glow); animation: breathe 3s ease-in-out infinite; }
    .ol-name  { font-size: 13px; letter-spacing: 8px; color: var(--dim); text-transform: uppercase; }
    .ol-sub   { font-size: 11px; letter-spacing: 4px; color: var(--dim); opacity: .6; margin-bottom: 24px; }

    .enter-btn {
      padding: 11px 44px;
      border: 1px solid var(--accent); background: transparent;
      color: var(--accent); font-size: 12px; letter-spacing: 5px;
      text-transform: uppercase; cursor: pointer;
      transition: background .3s, box-shadow .3s;
    }
    .enter-btn:hover { background: rgba(200,169,110,.08); box-shadow: 0 0 24px var(--glow); }

    @keyframes breathe {
      0%,100% { opacity: .7; text-shadow: 0 0 40px var(--glow); }
      50%      { opacity: 1;  text-shadow: 0 0 80px rgba(200,169,110,.5); }
    }

    /* ── APP ── */
    #app {
      position: relative; z-index: 1;
      height: 100%; height: 100dvh;
      max-width: 430px; margin: 0 auto;
      display: flex; flex-direction: column; align-items: center;
      padding:
        max(env(safe-area-inset-top), 16px)
        20px
        max(env(safe-area-inset-bottom), 12px);
    }

    /* ── HEADER ── */
    .hdr { width: 100%; text-align: center; padding-bottom: 6px; }
    .hdr-main { font-size: 20px; letter-spacing: 10px; color: var(--accent); text-shadow: 0 0 20px var(--glow); }
    .hdr-sub  { font-size: 10px; letter-spacing: 4px; color: var(--dim); margin-top: 3px; }

    /* ── PORTRAIT ── */
    .portrait-wrap { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; min-height: 0; }

    .portrait-outer {
      position: relative;
      width: min(240px, 56vw); aspect-ratio: 3/4;
    }
    .portrait-outer::before, .portrait-outer::after {
      content: ''; position: absolute; width: 28px; height: 28px;
      border-color: var(--accent); border-style: solid; opacity: .55; transition: opacity .4s;
    }
    .portrait-outer::before { top: -5px; left: -5px; border-width: 2px 0 0 2px; }
    .portrait-outer::after  { bottom: -5px; right: -5px; border-width: 0 2px 2px 0; }
    .portrait-outer.speaking::before,
    .portrait-outer.speaking::after { opacity: 1; }

    .ring { position: absolute; inset: -16px; border-radius: 2px; border: 1.5px solid var(--accent); opacity: 0; pointer-events: none; }
    .portrait-outer.speaking .ring:nth-child(1) { animation: ring-pulse 2s .0s  ease-out infinite; }
    .portrait-outer.speaking .ring:nth-child(2) { animation: ring-pulse 2s .65s ease-out infinite; }
    .portrait-outer.speaking .ring:nth-child(3) { animation: ring-pulse 2s 1.3s ease-out infinite; }
    @keyframes ring-pulse { 0% { transform: scale(1); opacity: .7; } 100% { transform: scale(1.12); opacity: 0; } }

    .portrait-inner {
      width: 100%; height: 100%;
      background: linear-gradient(155deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      overflow: hidden; display: flex; align-items: center; justify-content: center;
    }
    .portrait-inner img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }

    .portrait-placeholder { display: flex; flex-direction: column; align-items: center; gap: 8px; opacity: .4; }
    .ph-kanji { font-size: 80px; color: var(--accent); line-height: 1; }
    .ph-name  { font-size: 11px; letter-spacing: 6px; color: var(--dim); }

    /* ── DIVIDER ── */
    .divider { width: 100%; display: flex; align-items: center; gap: 8px; padding: 10px 0; }
    .div-line    { flex: 1; height: 1px; background: rgba(200,169,110,.12); }
    .div-diamond { width: 5px; height: 5px; background: var(--accent); transform: rotate(45deg); opacity: .35; }

    /* ── SUBTITLES ── */
    .subs {
      width: 100%; max-height: 110px; overflow-y: auto; scrollbar-width: none;
      background: rgba(10,10,15,.7); border-top: 1px solid rgba(200,169,110,.1);
      padding: 10px 16px 12px;
    }
    .subs::-webkit-scrollbar { display: none; }
    .subs-user  { font-size: 11px; font-style: italic; color: var(--dim); min-height: 16px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .subs-label { font-size: 9px; letter-spacing: 3px; color: var(--dim); opacity: .7; margin-bottom: 4px; text-transform: uppercase; }
    .subs-text  { font-size: 15px; line-height: 1.65; color: var(--text); min-height: 48px; }

    .dots { display: inline-flex; gap: 5px; align-items: center; }
    .dots span { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); animation: dot 1.4s ease-in-out infinite; }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes dot { 0%,80%,100% { transform: scale(.5); opacity: .3; } 40% { transform: scale(1); opacity: 1; } }

    /* ── CONTROLS ── */
    .controls { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; padding-top: 14px; }
    .status { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--dim); height: 14px; transition: color .3s; }
    .status.on  { color: var(--accent); }
    .status.err { color: var(--red); }

    .mic-btn {
      width: 76px; height: 76px; border-radius: 50%;
      border: 2px solid var(--accent); background: transparent;
      cursor: pointer; position: relative;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .2s, box-shadow .2s;
      -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none;
    }
    .mic-btn::before { content: ''; position: absolute; inset: 7px; border-radius: 50%; background: rgba(200,169,110,.06); transition: all .2s; }
    .mic-btn.rec { border-color: var(--red); box-shadow: 0 0 28px rgba(200,74,74,.35); }
    .mic-btn.rec::before { background: rgba(200,74,74,.15); transform: scale(1.15); }
    .mic-btn:disabled { opacity: .25; cursor: default; }

    .mic-icon { width: 26px; height: 26px; fill: var(--accent); position: relative; z-index: 1; transition: fill .2s; }
    .mic-btn.rec .mic-icon { fill: var(--red); }
    .btn-hint { font-size: 10px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; }
  </style>
</head>
<body>

<div id="overlay">
  <div class="ol-kanji">膝丸</div>
  <div class="ol-name">Hizamaru</div>
  <div class="ol-sub">源氏之太刀 · TOUKEN RANBU</div>
  <button class="enter-btn" id="enter-btn">進入 · Enter</button>
</div>

<div id="app">
  <header class="hdr">
    <div class="hdr-main">膝 丸</div>
    <div class="hdr-sub">HIZAMARU · MINAMOTO TACHI</div>
  </header>

  <div class="portrait-wrap">
    <div class="portrait-outer" id="portrait">
      <div class="ring"></div><div class="ring"></div><div class="ring"></div>
      <div class="portrait-inner" id="portrait-inner">
        <!-- To add portrait: replace below with <img src="hizamaru.jpg" alt="Hizamaru"> -->
        <div class="portrait-placeholder">
          <div class="ph-kanji">刀</div>
          <div class="ph-name">HIZAMARU</div>
        </div>
      </div>
    </div>
  </div>

  <div class="divider">
    <div class="div-line"></div><div class="div-diamond"></div><div class="div-line"></div>
  </div>

  <div class="subs" id="subs">
    <div class="subs-user"  id="user-line"></div>
    <div class="subs-label">膝丸</div>
    <div class="subs-text"  id="hiza-line"></div>
  </div>

  <div class="controls">
    <div class="status" id="status">準備完畢</div>
    <button class="mic-btn" id="mic-btn" disabled>
      <svg class="mic-icon" viewBox="0 0 24 24">
        <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v6a2 2 0 0 0 4 0V5a2 2 0 0 0-2-2zm-7 9a7 7 0 0 0 14 0h2a9 9 0 0 1-8 8.94V23h-2v-2.06A9 9 0 0 1 3 12h2z"/>
      </svg>
    </button>
    <div class="btn-hint">長按說話</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  CONFIG — loaded at runtime from /api/el-config
//  Anthropic & OpenAI keys stay server-side only
// ═══════════════════════════════════════════
const CFG = {
  SB_URL:    'https://xnesmbdbkefegdslqvuf.supabase.co',
  SB_ANON:   'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhuZXNtYmRia2VmZWdkc2xxdnVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjk5NTMsImV4cCI6MjA5MTYwNTk1M30.5ItXGA4u8wkz6_YN7msyeFeP9JbnY4a-9Inr8HHoUlk',
  SUMMARY_EVERY: 10,
  // ElevenLabs config fetched on init from /api/el-config
  EL_KEY:   null,
  EL_VOICE: null,
};

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
const S = {
  audioCtx:   null,
  sessionId:  localStorage.getItem('hiza_session') || null,
  history:    [],
  summary:    '',
  exchanges:  0,
  recording:  false,
  processing: false,
  speaking:   false,
  mediaRec:   null,
  chunks:     [],
  nextPlayAt: 0,
  activeSrcs: [],
};

// ═══════════════════════════════════════════
//  DOM
// ═══════════════════════════════════════════
const $overlay  = document.getElementById('overlay');
const $enterBtn = document.getElementById('enter-btn');
const $portrait = document.getElementById('portrait');
const $userLine = document.getElementById('user-line');
const $hizaLine = document.getElementById('hiza-line');
const $status   = document.getElementById('status');
const $micBtn   = document.getElementById('mic-btn');
const $subs     = document.getElementById('subs');

function setStatus(msg, cls = '') {
  $status.textContent = msg;
  $status.className = 'status' + (cls ? ' ' + cls : '');
}
function showDots() { $hizaLine.innerHTML = '<span class="dots"><span></span><span></span><span></span></span>'; }
function hideDots()  { const d = $hizaLine.querySelector('.dots'); if (d) d.remove(); }

// ═══════════════════════════════════════════
//  SUPABASE  (anon key is designed to be public)
// ═══════════════════════════════════════════
async function sbFetch(method, path, body) {
  const r = await fetch(`${CFG.SB_URL}/rest/v1${path}`, {
    method,
    headers: {
      'apikey':        CFG.SB_ANON,
      'Authorization': `Bearer ${CFG.SB_ANON}`,
      'Content-Type':  'application/json',
      'Prefer':        method === 'POST' ? 'return=representation' : '',
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (r.status === 204) return null;
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sbInit() {
  try {
    if (S.sessionId) {
      const [session] = await sbFetch('GET', `/sessions?id=eq.${S.sessionId}&limit=1`) || [];
      if (session) {
        S.summary = session.memory_summary || '';
        const msgs = await sbFetch('GET', `/messages?session_id=eq.${S.sessionId}&order=created_at.asc&limit=60`) || [];
        S.history   = msgs.map(m => ({ role: m.role, content: m.content }));
        S.exchanges = msgs.filter(m => m.role === 'user').length;
        return;
      }
    }
    const [s] = await sbFetch('POST', '/sessions', { memory_summary: '' });
    S.sessionId = s.id;
    localStorage.setItem('hiza_session', s.id);
  } catch (e) { console.warn('Supabase offline:', e.message); }
}

async function sbSave(role, content) {
  if (!S.sessionId) return;
  try { await sbFetch('POST', '/messages', { session_id: S.sessionId, role, content }); }
  catch (e) { console.warn('sbSave:', e.message); }
}

// ═══════════════════════════════════════════
//  SUMMARY  (via /api/summary — server-side)
// ═══════════════════════════════════════════
async function generateSummary() {
  try {
    const r = await fetch('/api/summary', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ history: S.history.slice(-20), prevSummary: S.summary }),
    });
    const { summary } = await r.json();
    S.summary = summary;
    if (S.sessionId) await sbFetch('PATCH', `/sessions?id=eq.${S.sessionId}`, { memory_summary: summary });
  } catch (e) { console.warn('summary:', e.message); }
}

// ═══════════════════════════════════════════
//  WHISPER  (via /api/transcribe — server-side)
// ═══════════════════════════════════════════
async function whisper(blob) {
  const fd = new FormData();
  fd.append('file', blob, 'audio.webm');
  const r = await fetch('/api/transcribe', { method: 'POST', body: fd });
  if (!r.ok) throw new Error(`transcribe ${r.status}`);
  const d = await r.json();
  return (d.text || '').trim();
}

// ═══════════════════════════════════════════
//  CLAUDE STREAMING  (via /api/chat — server-side)
// ═══════════════════════════════════════════
async function* streamClaude(userMsg) {
  const r = await fetch('/api/chat', {
    method:  'POST',
    headers: { 'content-type': 'application/json' },
    body:    JSON.stringify({ messages: [...S.history.slice(-12), { role: 'user', content: userMsg }], summary: S.summary }),
  });
  if (!r.ok) throw new Error(`chat ${r.status}`);

  const reader = r.body.getReader();
  const dec = new TextDecoder();
  let buf = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const raw = line.slice(6).trim();
      if (raw === '[DONE]') return;
      try {
        const ev = JSON.parse(raw);
        if (ev.type === 'content_block_delta' && ev.delta?.type === 'text_delta') yield ev.delta.text;
      } catch {}
    }
  }
}

// ═══════════════════════════════════════════
//  ELEVENLABS WebSocket TTS
//  Key fetched from /api/el-config at init — never in source
// ═══════════════════════════════════════════
class TTS {
  constructor() {
    this.ws = null;
    this.doneResolve = null;
    this.done = new Promise(res => { this.doneResolve = res; });
  }

  connect() {
    return new Promise((resolve, reject) => {
      const url = `wss://api.elevenlabs.io/v1/text-to-speech/${CFG.EL_VOICE}/stream-input?model_id=eleven_flash_v2_5&output_format=mp3_44100_128`;
      this.ws = new WebSocket(url);

      this.ws.onopen = () => {
        this.ws.send(JSON.stringify({
          text: ' ',
          xi_api_key: CFG.EL_KEY,
          voice_settings: { stability: 0.55, similarity_boost: 0.80, style: 0.20, use_speaker_boost: true },
          generation_config: { chunk_length_schedule: [80, 160, 250] },
        }));
        resolve();
      };

      this.ws.onmessage = async e => {
        let msg; try { msg = JSON.parse(e.data); } catch { return; }
        if (msg.audio) {
          const bytes = Uint8Array.from(atob(msg.audio), c => c.charCodeAt(0));
          await this._scheduleChunk(bytes.buffer);
        }
        if (msg.isFinal) setTimeout(() => this.doneResolve(), 200);
      };

      this.ws.onerror = () => { this.doneResolve(); reject(new Error('EL WS error')); };
      this.ws.onclose  = () => this.doneResolve();
    });
  }

  async _scheduleChunk(buf) {
    try {
      const decoded = await S.audioCtx.decodeAudioData(buf.slice(0));
      const src = S.audioCtx.createBufferSource();
      src.buffer = decoded;
      src.connect(S.audioCtx.destination);
      const now = S.audioCtx.currentTime;
      if (S.nextPlayAt < now) S.nextPlayAt = now;
      src.start(S.nextPlayAt);
      S.nextPlayAt += decoded.duration;
      S.activeSrcs.push(src);
    } catch (e) { console.warn('decode skip:', e.message); }
  }

  send(text)  { if (this.ws?.readyState === 1) this.ws.send(JSON.stringify({ text })); }
  flush()     { if (this.ws?.readyState === 1) this.ws.send(JSON.stringify({ text: '' })); }
  close()     { try { this.ws?.close(); } catch {} }
}

function stopAllAudio() {
  S.activeSrcs.forEach(s => { try { s.stop(); } catch {} });
  S.activeSrcs = [];
  S.nextPlayAt = S.audioCtx?.currentTime ?? 0;
  $portrait.classList.remove('speaking');
  S.speaking = false;
}

// ═══════════════════════════════════════════
//  FIRST MESSAGE
// ═══════════════════════════════════════════
async function playFirstMessage() {
  const text = '審神者，你終於來了。我一直在等你。';
  S.processing = true;
  $micBtn.disabled = true;
  showDots();
  setStatus('膝丸說話中…', 'on');

  try {
    const tts = new TTS();
    await tts.connect();
    hideDots();
    $hizaLine.textContent = text;
    $portrait.classList.add('speaking');
    S.speaking = true;
    tts.send(text);
    tts.flush();
    await tts.done;
    const waitMs = Math.max(0, (S.nextPlayAt - S.audioCtx.currentTime) * 1000);
    await new Promise(r => setTimeout(r, waitMs + 400));
  } catch (e) {
    console.error('firstMsg:', e);
    $hizaLine.textContent = text;
    hideDots();
  }

  S.history.push({ role: 'assistant', content: text });
  sbSave('assistant', text);
  $portrait.classList.remove('speaking');
  S.speaking = false;
  S.processing = false;
  $micBtn.disabled = false;
  setStatus('準備完畢');
}

// ═══════════════════════════════════════════
//  MAIN PIPELINE
// ═══════════════════════════════════════════
async function pipeline() {
  if (S.processing) return;
  S.processing = true;
  $micBtn.disabled = true;
  stopAllAudio();

  try {
    const blob = await stopRecording();
    if (!blob || blob.size < 800) { setStatus('未偵測到語音'); return; }

    setStatus('辨識語音…', 'on');
    const userText = await whisper(blob);
    if (!userText) { setStatus('無法辨識'); return; }

    $userLine.textContent = `「${userText}」`;
    showDots();
    setStatus('膝丸思考中…', 'on');

    const tts = new TTS();
    await tts.connect();

    let fullReply = '';
    let ttsBuf = '';
    hideDots();
    $hizaLine.textContent = '';
    $portrait.classList.add('speaking');
    S.speaking = true;
    setStatus('膝丸說話中…', 'on');

    for await (const chunk of streamClaude(userText)) {
      fullReply += chunk;
      ttsBuf    += chunk;
      $hizaLine.textContent = fullReply;
      $subs.scrollTop = $subs.scrollHeight;
      if (ttsBuf.length >= 25 || /[。！？，\n]/.test(ttsBuf)) {
        tts.send(ttsBuf);
        ttsBuf = '';
      }
    }
    if (ttsBuf) tts.send(ttsBuf);
    tts.flush();

    await tts.done;
    const waitMs = Math.max(0, (S.nextPlayAt - S.audioCtx.currentTime) * 1000);
    await new Promise(r => setTimeout(r, waitMs + 300));

    S.history.push({ role: 'user', content: userText }, { role: 'assistant', content: fullReply });
    sbSave('user', userText);
    sbSave('assistant', fullReply);
    S.exchanges++;
    if (S.exchanges % CFG.SUMMARY_EVERY === 0) generateSummary();

  } catch (e) {
    console.error('pipeline:', e);
    setStatus('發生錯誤', 'err');
    $hizaLine.textContent = '';
  } finally {
    $portrait.classList.remove('speaking');
    S.speaking = false;
    S.processing = false;
    $micBtn.disabled = false;
    if ($status.classList.contains('on')) setStatus('準備完畢');
  }
}

// ═══════════════════════════════════════════
//  RECORDING
// ═══════════════════════════════════════════
async function startRecording() {
  if (S.recording || S.processing) return;
  stopAllAudio();
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });
    S.chunks = [];
    S.mediaRec = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
    S.mediaRec.ondataavailable = e => { if (e.data.size > 0) S.chunks.push(e.data); };
    S.mediaRec.start(100);
    S.recording = true;
    $micBtn.classList.add('rec');
    setStatus('聆聽中…', 'on');
  } catch (e) { console.error('mic:', e); setStatus('麥克風錯誤', 'err'); }
}

function stopRecording() {
  if (!S.recording || !S.mediaRec) return Promise.resolve(null);
  S.recording = false;
  $micBtn.classList.remove('rec');
  return new Promise(resolve => {
    S.mediaRec.onstop = () => {
      S.mediaRec.stream.getTracks().forEach(t => t.stop());
      resolve(new Blob(S.chunks, { type: 'audio/webm;codecs=opus' }));
    };
    S.mediaRec.stop();
  });
}

// ═══════════════════════════════════════════
//  BUTTON EVENTS
// ═══════════════════════════════════════════
const onPress   = e => { e.preventDefault(); startRecording(); };
const onRelease = e => { e.preventDefault(); if (S.recording) pipeline(); };
$micBtn.addEventListener('mousedown',   onPress);
$micBtn.addEventListener('mouseup',     onRelease);
$micBtn.addEventListener('mouseleave',  onRelease);
$micBtn.addEventListener('touchstart',  onPress,   { passive: false });
$micBtn.addEventListener('touchend',    onRelease, { passive: false });
$micBtn.addEventListener('touchcancel', onRelease, { passive: false });

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
$enterBtn.addEventListener('click', async () => {
  S.audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
  S.nextPlayAt = 0;
  $overlay.classList.add('fade');
  setTimeout(() => { $overlay.style.display = 'none'; }, 850);
  setStatus('連接中…', 'on');

  // Fetch ElevenLabs config from server (key stays server-side)
  try {
    const elCfg = await fetch('/api/el-config').then(r => r.json());
    CFG.EL_KEY   = elCfg.apiKey;
    CFG.EL_VOICE = elCfg.voiceId;
  } catch (e) { console.warn('el-config fetch failed:', e); }

  await sbInit();

  if (S.history.length === 0) {
    await playFirstMessage();
  } else {
    const last = [...S.history].reverse().find(m => m.role === 'assistant');
    if (last) $hizaLine.textContent = last.content;
    setStatus('準備完畢');
    $micBtn.disabled = false;
  }
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
</script>
</body>
</html>
