<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="膝丸">
  <title>Hizamaru Companion</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="hizamaru-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #f0f7f4;
      --bg2:     #fafafa;
      --sage:    #8ab5a0;
      --sage-lt: rgba(138,181,160,0.18);
      --cream:   #f5efe6;
      --text:    #2d2d2d;
      --dim:     #8a9a94;
      --red:     #e07070;
      --card:    rgba(255,255,255,0.65);
      --shadow:  rgba(138,181,160,0.18);
    }

    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      color: var(--text);
    }

    /* Soft gradient background */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%,   rgba(138,181,160,0.15) 0%, transparent 65%),
        radial-gradient(ellipse 60% 50% at 80% 100%,  rgba(245,239,230,0.6)  0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 10% 80%,   rgba(138,181,160,0.08) 0%, transparent 55%);
    }

    /* ══════════════════════════════════════
       INIT OVERLAY
    ══════════════════════════════════════ */
    #overlay {
      position: fixed; inset: 0; z-index: 999;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      transition: opacity 0.8s ease;
    }
    #overlay.fade { opacity: 0; pointer-events: none; }

    .ol-avatar {
      width: 96px; height: 96px; border-radius: 28px;
      background: var(--card);
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px var(--shadow);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 4px; overflow: hidden;
    }
    .ol-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .ol-name { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: 0.5px; }
    .ol-sub  { font-size: 13px; color: var(--dim); font-weight: 500; margin-bottom: 20px; }

    .enter-btn {
      padding: 14px 48px;
      background: var(--sage); color: #fff;
      border: none; border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px; font-weight: 700; letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(138,181,160,0.4);
      transition: transform .15s, box-shadow .15s;
    }
    .enter-btn:hover  { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(138,181,160,0.5); }
    .enter-btn:active { transform: translateY(0); }

    /* ══════════════════════════════════════
       APP LAYOUT
    ══════════════════════════════════════ */
    #app {
      position: relative; z-index: 10;
      height: 100vh; height: 100dvh;
      max-width: 430px; margin: 0 auto;
      display: flex; flex-direction: column; align-items: center;
      padding:
        max(env(safe-area-inset-top), 16px)
        20px
        max(env(safe-area-inset-bottom), 12px);
      gap: 0;
    }

    /* ── HEADER ── */
    .hdr {
      width: 100%; flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center;
      padding-bottom: 10px;
    }
    .hdr-name { font-size: 20px; font-weight: 700; color: var(--text); }
    .hdr-sub  { font-size: 11px; font-weight: 500; color: var(--dim); margin-top: 2px; }

    /* ── CHARACTER AREA ── */
    .char-area {
      flex: 1; min-height: 0;
      width: 100%;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }

    .char-outer {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 100%;
    }

    /* Soft sage glow behind character */
    .char-glow {
      position: absolute;
      width: 280px; height: 380px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(138,181,160,0.28) 0%, transparent 70%);
      opacity: 0; transition: opacity 0.8s ease;
      pointer-events: none; filter: blur(28px);
    }
    .speaking .char-glow { opacity: 1; }

    /* Audio rings */
    .audio-rings {
      position: absolute;
      bottom: 7%; left: 50%;
      transform: translateX(-50%);
      width: 140px; height: 44px;
      pointer-events: none;
    }
    .aring {
      position: absolute; inset: 0;
      border: 1.5px solid rgba(138,181,160,0.55);
      border-radius: 50%; opacity: 0;
    }
    .speaking .aring:nth-child(1) { animation: aring 2.1s 0.0s ease-out infinite; }
    .speaking .aring:nth-child(2) { animation: aring 2.1s 0.7s ease-out infinite; }
    .speaking .aring:nth-child(3) { animation: aring 2.1s 1.4s ease-out infinite; }
    @keyframes aring {
      0%   { transform: scale(0.6); opacity: 0.65; }
      100% { transform: scale(4.5); opacity: 0; }
    }

    /* PNGtuber wrapper — float + breathe */
    .char-wrap {
      position: relative;
      width: min(280px, 65vw);
      aspect-ratio: 475 / 526;
      animation: pt-float 3s ease-in-out infinite, pt-breathe 4s ease-in-out infinite;
      transition: filter 0.6s ease;
      filter: drop-shadow(0 6px 18px rgba(138,181,160,0.0));
    }
    .speaking .char-wrap {
      filter:
        drop-shadow(0 0 22px rgba(138,181,160,0.65))
        drop-shadow(0 0 55px rgba(138,181,160,0.25));
    }
    @keyframes pt-float {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-8px); }
    }
    @keyframes pt-breathe {
      0%,100% { transform: scaleX(1.000) scaleY(1.000); }
      50%      { transform: scaleX(1.010) scaleY(1.018); }
    }

    .pt-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      mix-blend-mode: multiply;
      opacity: 0;
      transition: opacity 0.05s linear;
    }
    .pt-img.visible { opacity: 1; }

    /* Fallback placeholder */
    .char-placeholder {
      width: 220px; height: 300px;
      background: var(--card);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      box-shadow: 0 8px 32px var(--shadow);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; opacity: .5;
    }
    .ph-k { font-size: 72px; line-height: 1; }
    .ph-n { font-size: 11px; font-weight: 600; letter-spacing: 4px; color: var(--dim); }

    /* ── SUBTITLE CARD ── */
    .sub-area {
      width: 100%; flex-shrink: 0;
      background: var(--card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 20px;
      box-shadow: 0 4px 24px var(--shadow);
      padding: 14px 20px 16px;
      min-height: 88px;
      display: flex; flex-direction: column; gap: 5px;
      margin-bottom: 14px;
    }

    .sub-user {
      font-size: 11px; font-style: italic; font-weight: 500;
      color: var(--dim);
      min-height: 15px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      text-align: center;
    }

    .sub-hiza {
      font-size: 16px; line-height: 1.65; font-weight: 600;
      color: var(--text);
      text-align: center;
      min-height: 48px;
    }

    .sub-chunk {
      display: inline;
      opacity: 0;
      animation: chunk-in 0.25s ease forwards;
    }
    @keyframes chunk-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Loading dots */
    .dots { display: inline-flex; gap: 5px; align-items: center; vertical-align: middle; }
    .dots span {
      width: 5px; height: 5px; border-radius: 50%; background: var(--sage);
      animation: dot 1.4s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes dot { 0%,80%,100%{ transform:scale(.5); opacity:.3; } 40%{ transform:scale(1); opacity:1; } }

    /* ── CONTROLS ── */
    .controls {
      flex-shrink: 0;
      width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px;
    }

    .status {
      font-size: 11px; font-weight: 600;
      color: var(--dim); height: 15px; transition: color .3s;
      letter-spacing: 0.3px;
    }
    .status.on  { color: var(--sage); }
    .status.err { color: var(--red);  }

    .mic-btn {
      width: 72px; height: 72px; border-radius: 50%;
      border: none;
      background: var(--sage);
      cursor: pointer; position: relative;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(138,181,160,0.45);
      transition: transform .15s, box-shadow .15s, background .2s;
      -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none;
    }
    .mic-btn:hover  { transform: scale(1.05); box-shadow: 0 6px 26px rgba(138,181,160,0.55); }
    .mic-btn:active { transform: scale(0.97); }
    .mic-btn.rec {
      background: var(--red);
      box-shadow: 0 4px 22px rgba(224,112,112,0.45);
      animation: mic-pulse 1s ease-in-out infinite;
    }
    @keyframes mic-pulse {
      0%,100% { box-shadow: 0 4px 22px rgba(224,112,112,0.45); }
      50%      { box-shadow: 0 4px 32px rgba(224,112,112,0.7); }
    }
    .mic-btn:disabled { opacity: .35; cursor: default; transform: none; }

    .mic-icon { width: 26px; height: 26px; fill: #fff; position: relative; z-index: 1; }

    .btn-hint { font-size: 11px; font-weight: 500; color: var(--dim); }
  </style>
</head>
<body>

<!-- Init overlay -->
<div id="overlay">
  <div class="ol-avatar"><img src="hizamaru-icon.png" alt="Hizamaru" onerror="this.parentElement.textContent='🗡️'"></div>
  <div class="ol-name">Hizamaru</div>
  <div class="ol-sub">Minamoto Tachi · Touken Ranbu</div>
  <button class="enter-btn" id="enter-btn">Start chatting</button>
</div>

<!-- App -->
<div id="app">
  <header class="hdr">
    <div class="hdr-name">Hizamaru</div>
    <div class="hdr-sub">Minamoto Tachi</div>
  </header>

  <div class="char-area">
    <div class="char-outer" id="char-outer">
      <div class="char-glow"></div>
      <div class="audio-rings">

      </div>
      <!-- Single animated wrapper — float + breathe applied here -->
      <div class="char-wrap" id="char-wrap">
        <img id="pt-idle"  class="pt-img visible" src="hizamaru-idle.png"     alt="Hizamaru"
             onerror="this.style.display='none';document.getElementById('char-ph').style.display='flex'">

      </div>

  <!-- Subtitles -->

      <svg class="mic-icon" viewBox="0 0 24 24">
        <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v6a2 2 0 0 0 4 0V5a2 2 0 0 0-2-2zm-7 9a7 7 0 0 0 14 0h2a9 9 0 0 1-8 8.94V23h-2v-2.06A9 9 0 0 1 3 12h2z"/>
      </svg>
    </button>
    <div class="btn-hint">Hold to speak</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════
const CFG = {
  SB_URL:        'https://xnesmbdbkefegdslqvuf.supabase.co',
  SB_ANON:       'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhuZXNtYmRia2VmZWdkc2xxdnVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjk5NTMsImV4cCI6MjA5MTYwNTk1M30.5ItXGA4u8wkz6_YN7msyeFeP9JbnY4a-9Inr8HHoUlk',
  SUMMARY_EVERY: 10,
  EL_KEY:        null,
  EL_VOICE:      null,
};

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
const S = {
  audioCtx:    null,
  analyser:    null,
  analyserBuf: null,
  mouthRaf:    null,
  blinkTimer:  null,
  sessionId:   localStorage.getItem('hiza_session') || null,
  history:     [],
  summary:     '',
  exchanges:   0,
  recording:   false,
  processing:  false,
  speaking:    false,
  mediaRec:    null,
  chunks:      [],
  nextPlayAt:  0,
  activeSrcs:  [],
};

// ═══════════════════════════════════════════
//  DOM
// ═══════════════════════════════════════════
const $overlay   = document.getElementById('overlay');
const $enterBtn  = document.getElementById('enter-btn');
const $charOuter = document.getElementById('char-outer');
const $userLine  = document.getElementById('user-line');
const $hizaLine  = document.getElementById('hiza-line');
const $status    = document.getElementById('status');
const $micBtn    = document.getElementById('mic-btn');

// PNGtuber image elements
const $ptIdle  = document.getElementById('pt-idle');
const $ptSpeak = document.getElementById('pt-speak');
const $ptBlink = document.getElementById('pt-blink');

function setStatus(msg, cls = '') {
  $status.textContent = msg;
  $status.className = 'status' + (cls ? ' ' + cls : '');
}
function showDots() {
  $hizaLine.innerHTML = '<span class="dots"><span></span><span></span><span></span></span>';
}
function addChunk(text) {
  const span = document.createElement('span');
  span.className = 'sub-chunk';
  span.textContent = text;
  $hizaLine.appendChild(span);
}

// ═══════════════════════════════════════════
//  3-STATE PNGTUBER
// ═══════════════════════════════════════════

// States: 'idle' | 'speaking' | 'blink'
// Only opacity changes — never size or position.

function showState(state) {
  $ptIdle .classList.toggle('visible', state === 'idle');
  $ptSpeak.classList.toggle('visible', state === 'speaking');
  $ptBlink.classList.toggle('visible', state === 'blink');
}

// ── Analyser (mouth detection) ──
const MOUTH_THRESHOLD = 0.01; // normalised 0–1 RMS

function initAnalyser() {
  if (S.analyser) return;
  S.analyser = S.audioCtx.createAnalyser();
  S.analyser.fftSize = 256;
  S.analyser.smoothingTimeConstant = 0.5;
  S.analyserBuf = new Float32Array(S.analyser.fftSize);
  S.analyser.connect(S.audioCtx.destination);
}

function startMouthLoop() {
  if (S.mouthRaf) return;
  const tick = () => {
    if (!S.speaking) { S.mouthRaf = null; return; }
    S.analyser.getFloatTimeDomainData(S.analyserBuf);
    let sum = 0;
    for (let i = 0; i < S.analyserBuf.length; i++) sum += S.analyserBuf[i] * S.analyserBuf[i];
    const rms = Math.sqrt(sum / S.analyserBuf.length);
    showState(rms > MOUTH_THRESHOLD ? 'speaking' : 'idle');
    S.mouthRaf = requestAnimationFrame(tick);
  };
  S.mouthRaf = requestAnimationFrame(tick);
}

function stopMouthLoop() {
  if (S.mouthRaf) { cancelAnimationFrame(S.mouthRaf); S.mouthRaf = null; }
}

// ── Speaking state ──
function setSpeaking(on) {
  S.speaking = on;
  $charOuter.classList.toggle('speaking', on);
  if (on) {
    stopBlink();
    startMouthLoop();
  } else {
    stopMouthLoop();
    showState('idle');
    scheduleBlink();
  }
}

// ── Blink (idle only, never during speaking) ──
function scheduleBlink() {
  clearTimeout(S.blinkTimer);
  const delay = 4000 + Math.random() * 2000;
  S.blinkTimer = setTimeout(() => {
    if (S.speaking) { scheduleBlink(); return; }
    showState('blink');
    setTimeout(() => {
      if (!S.speaking) showState('idle');
      scheduleBlink();
    }, 150);
  }, delay);
}

function stopBlink() {
  clearTimeout(S.blinkTimer);
  S.blinkTimer = null;
}

// ═══════════════════════════════════════════
//  SUPABASE
// ═══════════════════════════════════════════
async function sbFetch(method, path, body) {
  const r = await fetch(`${CFG.SB_URL}/rest/v1${path}`, {
    method,
    headers: {
      'apikey':        CFG.SB_ANON,
      'Authorization': `Bearer ${CFG.SB_ANON}`,
      'Content-Type':  'application/json',
      'Prefer':        method === 'POST' ? 'return=representation' : '',
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (r.status === 204) return null;
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sbInit() {
  try {
    if (S.sessionId) {
      const [s] = await sbFetch('GET', `/sessions?id=eq.${S.sessionId}&limit=1`) || [];
      if (s) {
        S.summary = s.memory_summary || '';
        const msgs = await sbFetch('GET', `/messages?session_id=eq.${S.sessionId}&order=created_at.asc&limit=60`) || [];
        S.history   = msgs.map(m => ({ role: m.role, content: m.content }));
        S.exchanges = msgs.filter(m => m.role === 'user').length;
        return;
      }
    }
    const [s] = await sbFetch('POST', '/sessions', { memory_summary: '' });
    S.sessionId = s.id;
    localStorage.setItem('hiza_session', s.id);
  } catch (e) { console.warn('Supabase offline:', e.message); }
}

async function sbSave(role, content) {
  if (!S.sessionId) return;
  try { await sbFetch('POST', '/messages', { session_id: S.sessionId, role, content }); }
  catch (e) { console.warn('sbSave:', e.message); }
}

// ═══════════════════════════════════════════
//  SUMMARY
// ═══════════════════════════════════════════
async function generateSummary() {
  try {
    const r = await fetch('/api/summary', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ history: S.history.slice(-20), prevSummary: S.summary }),
    });
    const { summary } = await r.json();
    S.summary = summary;
    if (S.sessionId) await sbFetch('PATCH', `/sessions?id=eq.${S.sessionId}`, { memory_summary: summary });
  } catch (e) { console.warn('summary:', e.message); }
}

// ═══════════════════════════════════════════
//  WHISPER
// ═══════════════════════════════════════════
async function whisper(blob) {
  const fd = new FormData();
  fd.append('file', blob, 'audio.webm');
  const r = await fetch('/api/transcribe', { method: 'POST', body: fd });
  if (!r.ok) throw new Error(`transcribe ${r.status}`);
  const d = await r.json();
  return (d.text || '').trim();
}

// ═══════════════════════════════════════════
//  CLAUDE STREAMING
// ═══════════════════════════════════════════
async function* streamClaude(userMsg) {
  const r = await fetch('/api/chat', {
    method:  'POST',
    headers: { 'content-type': 'application/json' },
    body:    JSON.stringify({
      messages: [...S.history.slice(-12), { role: 'user', content: userMsg }],
      summary:  S.summary,
    }),
  });
  if (!r.ok) throw new Error(`chat ${r.status}`);

  const reader = r.body.getReader();
  const dec = new TextDecoder();
  let buf = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const raw = line.slice(6).trim();
      if (raw === '[DONE]') return;
      try {
        const ev = JSON.parse(raw);
        if (ev.type === 'content_block_delta' && ev.delta?.type === 'text_delta') yield ev.delta.text;
      } catch {}
    }
  }
}

// ═══════════════════════════════════════════
//  ELEVENLABS WebSocket TTS
// ═══════════════════════════════════════════
class TTS {
  constructor() {
    this.ws = null;
    this.doneResolve = null;
    this.done = new Promise(res => { this.doneResolve = res; });
  }

  connect() {
    return new Promise((resolve, reject) => {
      const url = `wss://api.elevenlabs.io/v1/text-to-speech/${CFG.EL_VOICE}/stream-input?model_id=eleven_multilingual_v2&output_format=mp3_44100_128`;
      this.ws = new WebSocket(url);

      this.ws.onopen = () => {
        this.ws.send(JSON.stringify({
          text: ' ',
          xi_api_key: CFG.EL_KEY,
          language_code: 'zh',
          voice_settings: { stability: 0.55, similarity_boost: 0.80, style: 0.20, use_speaker_boost: true },
          generation_config: { chunk_length_schedule: [80, 160, 250] },
        }));
        resolve();
      };

      this.ws.onmessage = async e => {
        let msg; try { msg = JSON.parse(e.data); } catch { return; }
        if (msg.audio) {
          const bytes = Uint8Array.from(atob(msg.audio), c => c.charCodeAt(0));
          await this._schedule(bytes.buffer);
        }
        if (msg.isFinal) setTimeout(() => this.doneResolve(), 200);
      };

      this.ws.onerror = () => { this.doneResolve(); reject(new Error('EL WS error')); };
      this.ws.onclose = () => this.doneResolve();
    });
  }

  async _schedule(buf) {
    try {
      const decoded = await S.audioCtx.decodeAudioData(buf.slice(0));
      const src = S.audioCtx.createBufferSource();
      src.buffer = decoded;
      // Route through analyser so mouth detection sees the audio signal
      src.connect(S.analyser);
      const now = S.audioCtx.currentTime;
      if (S.nextPlayAt < now) S.nextPlayAt = now;
      src.start(S.nextPlayAt);
      S.nextPlayAt += decoded.duration;
      S.activeSrcs.push(src);
    } catch (e) { console.warn('decode skip:', e.message); }
  }

  send(text)  { if (this.ws?.readyState === 1) this.ws.send(JSON.stringify({ text })); }
  flush()     { if (this.ws?.readyState === 1) this.ws.send(JSON.stringify({ text: '' })); }
}

function stopAllAudio() {
  S.activeSrcs.forEach(s => { try { s.stop(); } catch {} });
  S.activeSrcs = [];
  S.nextPlayAt = S.audioCtx?.currentTime ?? 0;
  setSpeaking(false);
}

// ═══════════════════════════════════════════
//  FIRST MESSAGE
// ═══════════════════════════════════════════
async function playFirstMessage() {
  const text = '審神者，你終於來了。我一直在等你。';
  S.processing = true;
  $micBtn.disabled = true;
  showDots();
  setStatus('Speaking…', 'on');

  try {
    const tts = new TTS();
    await tts.connect();

    $hizaLine.innerHTML = '';
    setSpeaking(true);
    // Animate the text chunks
    for (const char of text) {
      addChunk(char);
      await new Promise(r => setTimeout(r, 30));
    }
    tts.send(text);
    tts.flush();

    await tts.done;
    const waitMs = Math.max(0, (S.nextPlayAt - S.audioCtx.currentTime) * 1000);
    await new Promise(r => setTimeout(r, waitMs + 400));
  } catch (e) {
    console.error('firstMsg:', e);
    $hizaLine.textContent = text;
  }

  S.history.push({ role: 'assistant', content: text });
  sbSave('assistant', text);
  setSpeaking(false);
  S.processing = false;
  $micBtn.disabled = false;
  setStatus('Ready');
}

// ═══════════════════════════════════════════
//  MAIN PIPELINE
// ═══════════════════════════════════════════
async function pipeline() {
  if (S.processing) return;
  S.processing = true;
  $micBtn.disabled = true;
  stopAllAudio();

  try {
    const blob = await stopRecording();
    if (!blob || blob.size < 800) { setStatus('No audio detected'); return; }

    setStatus('Transcribing…', 'on');
    const userText = await whisper(blob);
    if (!userText) { setStatus('Could not transcribe'); return; }

    $userLine.textContent = `"${userText}"`;
    showDots();
    setStatus('Thinking…', 'on');

    const tts = new TTS();
    await tts.connect();

    let fullReply = '';
    let ttsBuf = '';
    $hizaLine.innerHTML = '';
    setSpeaking(true);
    setStatus('Speaking…', 'on');

    for await (const chunk of streamClaude(userText)) {
      fullReply += chunk;
      ttsBuf    += chunk;
      addChunk(chunk);

      if (ttsBuf.length >= 25 || /[。！？，\n]/.test(ttsBuf)) {
        tts.send(ttsBuf);
        ttsBuf = '';
      }
    }
    if (ttsBuf) tts.send(ttsBuf);
    tts.flush();

    await tts.done;
    const waitMs = Math.max(0, (S.nextPlayAt - S.audioCtx.currentTime) * 1000);
    await new Promise(r => setTimeout(r, waitMs + 300));

    S.history.push({ role: 'user', content: userText }, { role: 'assistant', content: fullReply });
    sbSave('user', userText);
    sbSave('assistant', fullReply);
    S.exchanges++;
    if (S.exchanges % CFG.SUMMARY_EVERY === 0) generateSummary();

  } catch (e) {
    console.error('pipeline:', e);
    setStatus('Something went wrong', 'err');
    $hizaLine.innerHTML = '';
  } finally {
    setSpeaking(false);
    S.processing = false;
    $micBtn.disabled = false;
    if ($status.classList.contains('on')) setStatus('Ready');
  }
}

// ═══════════════════════════════════════════
//  RECORDING
// ═══════════════════════════════════════════
async function startRecording() {
  if (S.recording || S.processing) return;
  stopAllAudio();
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });
    S.chunks = [];
    S.mediaRec = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
    S.mediaRec.ondataavailable = e => { if (e.data.size > 0) S.chunks.push(e.data); };
    S.mediaRec.start(100);
    S.recording = true;
    $micBtn.classList.add('rec');
    setStatus('Listening…', 'on');
  } catch (e) { console.error('mic:', e); setStatus('Microphone error', 'err'); }
}

function stopRecording() {
  if (!S.recording || !S.mediaRec) return Promise.resolve(null);
  S.recording = false;
  $micBtn.classList.remove('rec');
  return new Promise(resolve => {
    S.mediaRec.onstop = () => {
      S.mediaRec.stream.getTracks().forEach(t => t.stop());
      resolve(new Blob(S.chunks, { type: 'audio/webm;codecs=opus' }));
    };
    S.mediaRec.stop();
  });
}

// ═══════════════════════════════════════════
//  BUTTON EVENTS
// ═══════════════════════════════════════════
const onPress   = e => { e.preventDefault(); startRecording(); };
const onRelease = e => { e.preventDefault(); if (S.recording) pipeline(); };
$micBtn.addEventListener('mousedown',   onPress);
$micBtn.addEventListener('mouseup',     onRelease);
$micBtn.addEventListener('mouseleave',  onRelease);
$micBtn.addEventListener('touchstart',  onPress,   { passive: false });
$micBtn.addEventListener('touchend',    onRelease, { passive: false });
$micBtn.addEventListener('touchcancel', onRelease, { passive: false });

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
$enterBtn.addEventListener('click', async () => {
  S.audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
  S.nextPlayAt = 0;
  initAnalyser();
  $overlay.classList.add('fade');
  setTimeout(() => { $overlay.style.display = 'none'; }, 900);
  setStatus('Connecting…', 'on');

  // Fetch ElevenLabs credentials from server
  try {
    const cfg = await fetch('/api/el-config').then(r => r.json());
    CFG.EL_KEY   = cfg.apiKey;
    CFG.EL_VOICE = cfg.voiceId;
  } catch (e) { console.warn('el-config:', e); }

  if (!CFG.EL_KEY || !CFG.EL_VOICE) {
    setStatus('Missing API keys', 'err');
    $hizaLine.textContent = 'Please add environment variables in Vercel and redeploy.';
    $micBtn.disabled = false;
    return;
  }

  await sbInit();

  scheduleBlink(); // start idle blink loop

  if (S.history.length === 0) {
    await playFirstMessage();
  } else {
    const last = [...S.history].reverse().find(m => m.role === 'assistant');
    if (last) $hizaLine.textContent = last.content;
    setStatus('Ready');
    $micBtn.disabled = false;
  }
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
</script>
