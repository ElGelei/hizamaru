<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="膝丸">
  <title>Hizamaru Companion</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #0a0e14;
      --gold:     #c9a84c;
      --teal:     #a8c8b0;
      --teal-dim: rgba(168,200,176,0.25);
      --text:     #e8dcc8;
      --dim:      #5a5040;
      --red:      #c84a4a;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: 'Georgia','Times New Roman', serif; }

    /* ══════════════════════════════════════
       INIT OVERLAY
    ══════════════════════════════════════ */
    #overlay {
      position: fixed; inset: 0; z-index: 999;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      transition: opacity 1s ease;
    }
    #overlay.fade { opacity: 0; pointer-events: none; }

    .ol-kanji { font-size: 76px; color: var(--gold); text-shadow: 0 0 60px rgba(201,168,76,0.4); animation: ol-breathe 3s ease-in-out infinite; }
    .ol-name  { font-size: 12px; letter-spacing: 8px; color: var(--dim); text-transform: uppercase; }
    .ol-sub   { font-size: 10px; letter-spacing: 4px; color: var(--dim); opacity: .5; margin-bottom: 28px; }
    .enter-btn {
      padding: 12px 48px; border: 1px solid var(--gold); background: transparent;
      color: var(--gold); font-size: 12px; letter-spacing: 5px; text-transform: uppercase;
      cursor: pointer; transition: background .3s, box-shadow .3s; font-family: inherit;
    }
    .enter-btn:hover { background: rgba(201,168,76,0.07); box-shadow: 0 0 28px rgba(201,168,76,0.2); }

    @keyframes ol-breathe {
      0%,100% { opacity: .6; text-shadow: 0 0 40px rgba(201,168,76,0.3); }
      50%      { opacity: 1;  text-shadow: 0 0 80px rgba(201,168,76,0.55); }
    }

    /* ══════════════════════════════════════
       FIXED BACKGROUND LAYERS
    ══════════════════════════════════════ */
    .bg-base {
      position: fixed; inset: 0; z-index: 0;
      background: var(--bg);
    }

    /* Diagonal diamond pattern — Japanese aesthetic */
    .bg-base::before {
      content: ''; position: absolute; inset: 0; opacity: 1;
      background-image:
        repeating-linear-gradient(45deg,  transparent, transparent 28px, rgba(201,168,76,0.022) 28px, rgba(201,168,76,0.022) 29px),
        repeating-linear-gradient(-45deg, transparent, transparent 28px, rgba(201,168,76,0.022) 28px, rgba(201,168,76,0.022) 29px);
    }

    /* Radial depth — teal center glow, dark edges */
    .bg-base::after {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 55% at 50% 38%, rgba(168,200,176,0.045) 0%, transparent 70%),
        radial-gradient(ellipse at 50% 110%, rgba(0,0,0,0.7) 0%, transparent 55%);
    }

    /* ══════════════════════════════════════
       SAKURA PARTICLES
    ══════════════════════════════════════ */
    .sakura { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }

    .petal {
      position: absolute; top: -20px;
      width: 9px; height: 11px;
      border-radius: 50% 50% 50% 0;
      opacity: 0;
    }

    .petal::after {
      content: ''; position: absolute;
      width: 100%; height: 100%;
      border-radius: 0 50% 50% 50%;
      background: inherit;
      transform: rotate(90deg) translateX(1px);
    }

    /* 6 petals — varied position, delay, speed, drift */
    .petal:nth-child(1) { left: 8%;  background: rgba(255,200,215,0.50); animation: fall1 16s  2s  linear infinite; }
    .petal:nth-child(2) { left: 22%; background: rgba(255,215,225,0.40); animation: fall2 21s  0s  linear infinite; }
    .petal:nth-child(3) { left: 43%; background: rgba(240,190,205,0.45); animation: fall3 14s  7s  linear infinite; }
    .petal:nth-child(4) { left: 61%; background: rgba(255,205,218,0.38); animation: fall4 19s  4s  linear infinite; }
    .petal:nth-child(5) { left: 76%; background: rgba(245,195,210,0.48); animation: fall5 17s  1s  linear infinite; }
    .petal:nth-child(6) { left: 90%; background: rgba(255,210,220,0.35); animation: fall6 22s  9s  linear infinite; }

    @keyframes fall1 {
      0%   { transform: translate(0,    -20px) rotate(0deg);   opacity: 0; }
      8%   { opacity: 0.55; }
      88%  { opacity: 0.35; }
      100% { transform: translate(40px, 105vh) rotate(280deg); opacity: 0; }
    }
    @keyframes fall2 {
      0%   { transform: translate(0,     -20px) rotate(30deg);  opacity: 0; }
      8%   { opacity: 0.45; }
      88%  { opacity: 0.25; }
      100% { transform: translate(-30px, 105vh) rotate(320deg); opacity: 0; }
    }
    @keyframes fall3 {
      0%   { transform: translate(0,    -20px) rotate(15deg);  opacity: 0; }
      8%   { opacity: 0.5; }
      88%  { opacity: 0.3; }
      100% { transform: translate(55px, 105vh) rotate(400deg); opacity: 0; }
    }
    @keyframes fall4 {
      0%   { transform: translate(0,     -20px) rotate(45deg);  opacity: 0; }
      8%   { opacity: 0.42; }
      88%  { opacity: 0.22; }
      100% { transform: translate(-45px, 105vh) rotate(260deg); opacity: 0; }
    }
    @keyframes fall5 {
      0%   { transform: translate(0,    -20px) rotate(60deg);  opacity: 0; }
      8%   { opacity: 0.52; }
      88%  { opacity: 0.32; }
      100% { transform: translate(35px, 105vh) rotate(350deg); opacity: 0; }
    }
    @keyframes fall6 {
      0%   { transform: translate(0,     -20px) rotate(10deg);  opacity: 0; }
      8%   { opacity: 0.38; }
      88%  { opacity: 0.18; }
      100% { transform: translate(-55px, 105vh) rotate(300deg); opacity: 0; }
    }

    /* ══════════════════════════════════════
       APP LAYOUT
    ══════════════════════════════════════ */
    #app {
      position: relative; z-index: 10;
      height: 100vh; height: 100dvh;
      max-width: 430px; margin: 0 auto;
      display: flex; flex-direction: column; align-items: center;
      padding:
        max(env(safe-area-inset-top), 14px)
        0
        max(env(safe-area-inset-bottom), 10px);
    }

    /* ── HEADER ── */
    .hdr {
      width: 100%; text-align: center;
      padding: 0 0 8px;
      flex-shrink: 0;
    }
    .hdr-main { font-size: 18px; letter-spacing: 10px; color: var(--gold); text-shadow: 0 0 18px rgba(201,168,76,0.35); }
    .hdr-sub  { font-size: 9px; letter-spacing: 4px; color: var(--dim); margin-top: 3px; text-transform: uppercase; }

    /* ── CHARACTER AREA ── */
    .char-area {
      flex: 1; min-height: 0;
      width: 100%;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }

    /* Outer container — lean transition when speaking */
    .char-outer {
      position: relative;
      display: flex; align-items: flex-end; justify-content: center;
      height: 100%; width: 100%;
      transition: transform 0.6s ease;
    }
    .char-outer.lean { transform: translateY(-4px); }

    /* Audio pulse rings — ellipses rising from feet */
    .audio-rings {
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 40px;
      pointer-events: none;
    }
    .aring {
      position: absolute; inset: 0;
      border: 1.5px solid rgba(168,200,176,0.5);
      border-radius: 50%;
      opacity: 0;
    }
    .speaking .aring:nth-child(1) { animation: aring 2.1s 0s    ease-out infinite; }
    .speaking .aring:nth-child(2) { animation: aring 2.1s 0.7s  ease-out infinite; }
    .speaking .aring:nth-child(3) { animation: aring 2.1s 1.4s  ease-out infinite; }

    @keyframes aring {
      0%   { transform: scale(0.6);  opacity: 0.7; }
      100% { transform: scale(4.5);  opacity: 0;   }
    }

    /* Glow halo behind character — teal, only when speaking */
    .char-glow {
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 200px; height: 300px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(168,200,176,0.22) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
      filter: blur(20px);
    }
    .speaking .char-glow { opacity: 1; }

    /* Breathing wrapper — must propagate height for max-height: 100% on img */
    .char-breathe {
      height: 100%;
      display: flex; align-items: flex-end; justify-content: center;
      animation: breathe 4s ease-in-out infinite;
      transform-origin: center bottom;
    }

    /* Floating wrapper */
    .char-float {
      position: relative;
      display: flex; align-items: flex-end; justify-content: center;
      height: 100%;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes breathe {
      0%,100% { transform: scale(1.000); }
      50%      { transform: scale(1.018); }
    }
    @keyframes float {
      0%,100% { transform: translateY(0px);  }
      50%      { transform: translateY(-8px); }
    }

    #char-img {
      display: block;
      max-height: 100%;
      max-width: 90vw;
      width: auto;
      object-fit: contain;
      object-position: center bottom;
      /* mix-blend-mode drops white/light background on dark canvas */
      mix-blend-mode: lighten;
      transition: filter 0.7s ease;
      filter: drop-shadow(0 4px 16px rgba(168,200,176,0.0));
    }
    .speaking #char-img {
      filter:
        drop-shadow(0 0 18px rgba(168,200,176,0.55))
        drop-shadow(0 0 40px rgba(168,200,176,0.25));
    }

    /* Blink overlay — positioned at eye level */
    .blink-cover {
      position: absolute;
      top: 20%; left: 22%; right: 22%;
      height: 0;
      background: linear-gradient(to bottom,
        transparent 0%,
        rgba(10,14,20,0.92) 50%,
        transparent 100%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 5;
      transition: height 0.07s ease-in-out;
    }
    .blinking .blink-cover {
      height: 5%;
    }

    /* Fallback placeholder when hizamaru.png is missing */
    .char-placeholder {
      width: 220px; height: 320px;
      background: linear-gradient(155deg, #1a1e2e 0%, #16203e 50%, #0f2060 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; opacity: .4;
    }
    .ph-k { font-size: 90px; color: var(--gold); line-height: 1; }
    .ph-n { font-size: 10px; letter-spacing: 6px; color: var(--dim); }

    /* ── SUBTITLES ── */
    .sub-area {
      width: 100%; flex-shrink: 0;
      padding: 10px 28px 6px;
      min-height: 90px;
      background: linear-gradient(to top, rgba(10,14,20,0.85) 0%, transparent 100%);
      display: flex; flex-direction: column; gap: 4px;
    }

    .sub-user {
      font-size: 11px; font-style: italic;
      color: var(--dim);
      min-height: 16px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      text-align: center;
    }

    .sub-hiza {
      font-size: 17px; line-height: 1.7;
      color: var(--gold);
      text-align: center;
      min-height: 50px;
      text-shadow: 0 0 20px rgba(201,168,76,0.3);
    }

    /* Word-by-word fade in */
    .sub-chunk {
      display: inline;
      opacity: 0;
      animation: chunk-in 0.28s ease forwards;
    }
    @keyframes chunk-in {
      from { opacity: 0; transform: translateY(3px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Loading dots */
    .dots { display: inline-flex; gap: 5px; align-items: center; vertical-align: middle; }
    .dots span {
      width: 4px; height: 4px; border-radius: 50%; background: var(--gold);
      animation: dot 1.4s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes dot { 0%,80%,100%{ transform:scale(.5); opacity:.3; } 40%{ transform:scale(1); opacity:1; } }

    /* ── CONTROLS ── */
    .controls {
      flex-shrink: 0;
      width: 100%; display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 10px 0 4px;
    }

    .status {
      font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--dim); height: 13px; transition: color .3s;
    }
    .status.on  { color: var(--teal); }
    .status.err { color: var(--red);  }

    .mic-btn {
      width: 72px; height: 72px; border-radius: 50%;
      border: 1.5px solid var(--gold); background: transparent;
      cursor: pointer; position: relative;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .2s, box-shadow .2s;
      -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none;
    }
    .mic-btn::before {
      content: ''; position: absolute; inset: 6px; border-radius: 50%;
      background: rgba(201,168,76,0.05); transition: all .2s;
    }
    .mic-btn.rec {
      border-color: var(--red);
      box-shadow: 0 0 26px rgba(200,74,74,.4);
    }
    .mic-btn.rec::before { background: rgba(200,74,74,.15); transform: scale(1.1); }
    .mic-btn:disabled { opacity: .2; cursor: default; }

    .mic-icon { width: 24px; height: 24px; fill: var(--gold); position: relative; z-index: 1; transition: fill .2s; }
    .mic-btn.rec .mic-icon { fill: var(--red); }

    .btn-hint { font-size: 9px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; }
  </style>
</head>
<body>

<!-- Init overlay -->
<div id="overlay">
  <div class="ol-kanji">膝丸</div>
  <div class="ol-name">Hizamaru</div>
  <div class="ol-sub">源氏之太刀 · TOUKEN RANBU</div>
  <button class="enter-btn" id="enter-btn">進入 · Enter</button>
</div>

<!-- Background -->
<div class="bg-base"></div>

<!-- Sakura petals -->
<div class="sakura">
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
</div>

<!-- App -->
<div id="app">
  <header class="hdr">
    <div class="hdr-main">膝 丸</div>
    <div class="hdr-sub">HIZAMARU · MINAMOTO TACHI</div>
  </header>

  <div class="char-area">
    <div class="char-outer" id="char-outer">
      <!-- Glow halo (behind character) -->
      <div class="char-glow" id="char-glow"></div>
      <!-- Audio rings (at feet) -->
      <div class="audio-rings" id="audio-rings">
        <div class="aring"></div><div class="aring"></div><div class="aring"></div>
      </div>
      <!-- Breathing → floating → image -->
      <div class="char-breathe" id="char-breathe">
        <div class="char-float" id="char-float">
          <img src="hizamaru.png" id="char-img" alt="Hizamaru"
               onerror="this.style.display='none';document.getElementById('char-ph').style.display='flex'">
          <div class="blink-cover" id="blink-cover"></div>
        </div>
      </div>
      <!-- Fallback placeholder -->
      <div class="char-placeholder" id="char-ph" style="display:none">
        <div class="ph-k">刀</div>
        <div class="ph-n">HIZAMARU</div>
      </div>
    </div>
  </div>

  <!-- Subtitles -->
  <div class="sub-area">
    <div class="sub-user" id="user-line"></div>
    <div class="sub-hiza" id="hiza-line"></div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="status" id="status">準備完畢</div>
    <button class="mic-btn" id="mic-btn" disabled>
      <svg class="mic-icon" viewBox="0 0 24 24">
        <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v6a2 2 0 0 0 4 0V5a2 2 0 0 0-2-2zm-7 9a7 7 0 0 0 14 0h2a9 9 0 0 1-8 8.94V23h-2v-2.06A9 9 0 0 1 3 12h2z"/>
      </svg>
    </button>
    <div class="btn-hint">長按說話</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════
const CFG = {
  SB_URL:        'https://xnesmbdbkefegdslqvuf.supabase.co',
  SB_ANON:       'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhuZXNtYmRia2VmZWdkc2xxdnVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjk5NTMsImV4cCI6MjA5MTYwNTk1M30.5ItXGA4u8wkz6_YN7msyeFeP9JbnY4a-9Inr8HHoUlk',
  SUMMARY_EVERY: 10,
  EL_KEY:        null,
  EL_VOICE:      null,
};

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
const S = {
  audioCtx:   null,
  sessionId:  localStorage.getItem('hiza_session') || null,
  history:    [],
  summary:    '',
  exchanges:  0,
  recording:  false,
  processing: false,
  speaking:   false,
  mediaRec:   null,
  chunks:     [],
  nextPlayAt: 0,
  activeSrcs: [],
};

// ═══════════════════════════════════════════
//  DOM
// ═══════════════════════════════════════════
const $overlay   = document.getElementById('overlay');
const $enterBtn  = document.getElementById('enter-btn');
const $charOuter = document.getElementById('char-outer');
const $charImg   = document.getElementById('char-img');
const $breathe   = document.getElementById('char-breathe');
const $userLine  = document.getElementById('user-line');
const $hizaLine  = document.getElementById('hiza-line');
const $status    = document.getElementById('status');
const $micBtn    = document.getElementById('mic-btn');

function setStatus(msg, cls = '') {
  $status.textContent = msg;
  $status.className = 'status' + (cls ? ' ' + cls : '');
}

function showDots() {
  $hizaLine.innerHTML = '<span class="dots"><span></span><span></span><span></span></span>';
}

function addChunk(text) {
  const span = document.createElement('span');
  span.className = 'sub-chunk';
  span.textContent = text;
  $hizaLine.appendChild(span);
}

function setSpeaking(on) {
  S.speaking = on;
  $charOuter.classList.toggle('speaking', on);
  $charOuter.classList.toggle('lean', on);
}

// ═══════════════════════════════════════════
//  IDLE BLINK  (random 4–6s interval)
// ═══════════════════════════════════════════
function scheduleBlink() {
  const delay = 4000 + Math.random() * 2000;
  setTimeout(() => {
    $breathe.classList.add('blinking');
    setTimeout(() => {
      $breathe.classList.remove('blinking');
      scheduleBlink();
    }, 180);
  }, delay);
}

// ═══════════════════════════════════════════
//  SUPABASE
// ═══════════════════════════════════════════
async function sbFetch(method, path, body) {
  const r = await fetch(`${CFG.SB_URL}/rest/v1${path}`, {
    method,
    headers: {
      'apikey':        CFG.SB_ANON,
      'Authorization': `Bearer ${CFG.SB_ANON}`,
      'Content-Type':  'application/json',
      'Prefer':        method === 'POST' ? 'return=representation' : '',
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (r.status === 204) return null;
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sbInit() {
  try {
    if (S.sessionId) {
      const [s] = await sbFetch('GET', `/sessions?id=eq.${S.sessionId}&limit=1`) || [];
      if (s) {
        S.summary = s.memory_summary || '';
        const msgs = await sbFetch('GET', `/messages?session_id=eq.${S.sessionId}&order=created_at.asc&limit=60`) || [];
        S.history   = msgs.map(m => ({ role: m.role, content: m.content }));
        S.exchanges = msgs.filter(m => m.role === 'user').length;
        return;
      }
    }
    const [s] = await sbFetch('POST', '/sessions', { memory_summary: '' });
    S.sessionId = s.id;
    localStorage.setItem('hiza_session', s.id);
  } catch (e) { console.warn('Supabase offline:', e.message); }
}

async function sbSave(role, content) {
  if (!S.sessionId) return;
  try { await sbFetch('POST', '/messages', { session_id: S.sessionId, role, content }); }
  catch (e) { console.warn('sbSave:', e.message); }
}

// ═══════════════════════════════════════════
//  SUMMARY
// ═══════════════════════════════════════════
async function generateSummary() {
  try {
    const r = await fetch('/api/summary', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ history: S.history.slice(-20), prevSummary: S.summary }),
    });
    const { summary } = await r.json();
    S.summary = summary;
    if (S.sessionId) await sbFetch('PATCH', `/sessions?id=eq.${S.sessionId}`, { memory_summary: summary });
  } catch (e) { console.warn('summary:', e.message); }
}

// ═══════════════════════════════════════════
//  WHISPER
// ═══════════════════════════════════════════
async function whisper(blob) {
  const fd = new FormData();
  fd.append('file', blob, 'audio.webm');
  const r = await fetch('/api/transcribe', { method: 'POST', body: fd });
  if (!r.ok) throw new Error(`transcribe ${r.status}`);
  const d = await r.json();
  return (d.text || '').trim();
}

// ═══════════════════════════════════════════
//  CLAUDE STREAMING
// ═══════════════════════════════════════════
async function* streamClaude(userMsg) {
  const r = await fetch('/api/chat', {
    method:  'POST',
    headers: { 'content-type': 'application/json' },
    body:    JSON.stringify({
      messages: [...S.history.slice(-12), { role: 'user', content: userMsg }],
      summary:  S.summary,
    }),
  });
  if (!r.ok) throw new Error(`chat ${r.status}`);

  const reader = r.body.getReader();
  const dec = new TextDecoder();
  let buf = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const raw = line.slice(6).trim();
      if (raw === '[DONE]') return;
      try {
        const ev = JSON.parse(raw);
        if (ev.type === 'content_block_delta' && ev.delta?.type === 'text_delta') yield ev.delta.text;
      } catch {}
    }
  }
}

// ═══════════════════════════════════════════
//  ELEVENLABS WebSocket TTS
// ═══════════════════════════════════════════
class TTS {
  constructor() {
    this.ws = null;
    this.doneResolve = null;
    this.done = new Promise(res => { this.doneResolve = res; });
  }

  connect() {
    return new Promise((resolve, reject) => {
      const url = `wss://api.elevenlabs.io/v1/text-to-speech/${CFG.EL_VOICE}/stream-input?model_id=eleven_multilingual_v2&output_format=mp3_44100_128`;
      this.ws = new WebSocket(url);

      this.ws.onopen = () => {
        this.ws.send(JSON.stringify({
          text: ' ',
          xi_api_key: CFG.EL_KEY,
          language_code: 'zh',
          voice_settings: { stability: 0.55, similarity_boost: 0.80, style: 0.20, use_speaker_boost: true },
          generation_config: { chunk_length_schedule: [80, 160, 250] },
        }));
        resolve();
      };

      this.ws.onmessage = async e => {
        let msg; try { msg = JSON.parse(e.data); } catch { return; }
        if (msg.audio) {
          const bytes = Uint8Array.from(atob(msg.audio), c => c.charCodeAt(0));
          await this._schedule(bytes.buffer);
        }
        if (msg.isFinal) setTimeout(() => this.doneResolve(), 200);
      };

      this.ws.onerror = () => { this.doneResolve(); reject(new Error('EL WS error')); };
      this.ws.onclose = () => this.doneResolve();
    });
  }

  async _schedule(buf) {
    try {
      const decoded = await S.audioCtx.decodeAudioData(buf.slice(0));
      const src = S.audioCtx.createBufferSource();
      src.buffer = decoded;
      src.connect(S.audioCtx.destination);
      const now = S.audioCtx.currentTime;
      if (S.nextPlayAt < now) S.nextPlayAt = now;
      src.start(S.nextPlayAt);
      S.nextPlayAt += decoded.duration;
      S.activeSrcs.push(src);
    } catch (e) { console.warn('decode skip:', e.message); }
  }

  send(text)  { if (this.ws?.readyState === 1) this.ws.send(JSON.stringify({ text })); }
  flush()     { if (this.ws?.readyState === 1) this.ws.send(JSON.stringify({ text: '' })); }
}

function stopAllAudio() {
  S.activeSrcs.forEach(s => { try { s.stop(); } catch {} });
  S.activeSrcs = [];
  S.nextPlayAt = S.audioCtx?.currentTime ?? 0;
  setSpeaking(false);
}

// ═══════════════════════════════════════════
//  FIRST MESSAGE
// ═══════════════════════════════════════════
async function playFirstMessage() {
  const text = '審神者，你終於來了。我一直在等你。';
  S.processing = true;
  $micBtn.disabled = true;
  showDots();
  setStatus('膝丸說話中…', 'on');

  try {
    const tts = new TTS();
    await tts.connect();

    $hizaLine.innerHTML = '';
    setSpeaking(true);
    // Animate the text chunks
    for (const char of text) {
      addChunk(char);
      await new Promise(r => setTimeout(r, 30));
    }
    tts.send(text);
    tts.flush();

    await tts.done;
    const waitMs = Math.max(0, (S.nextPlayAt - S.audioCtx.currentTime) * 1000);
    await new Promise(r => setTimeout(r, waitMs + 400));
  } catch (e) {
    console.error('firstMsg:', e);
    $hizaLine.textContent = text;
  }

  S.history.push({ role: 'assistant', content: text });
  sbSave('assistant', text);
  setSpeaking(false);
  S.processing = false;
  $micBtn.disabled = false;
  setStatus('準備完畢');
}

// ═══════════════════════════════════════════
//  MAIN PIPELINE
// ═══════════════════════════════════════════
async function pipeline() {
  if (S.processing) return;
  S.processing = true;
  $micBtn.disabled = true;
  stopAllAudio();

  try {
    const blob = await stopRecording();
    if (!blob || blob.size < 800) { setStatus('未偵測到語音'); return; }

    setStatus('辨識語音…', 'on');
    const userText = await whisper(blob);
    if (!userText) { setStatus('無法辨識'); return; }

    $userLine.textContent = `「${userText}」`;
    showDots();
    setStatus('膝丸思考中…', 'on');

    const tts = new TTS();
    await tts.connect();

    let fullReply = '';
    let ttsBuf = '';
    $hizaLine.innerHTML = '';
    setSpeaking(true);
    setStatus('膝丸說話中…', 'on');

    for await (const chunk of streamClaude(userText)) {
      fullReply += chunk;
      ttsBuf    += chunk;
      addChunk(chunk);

      if (ttsBuf.length >= 25 || /[。！？，\n]/.test(ttsBuf)) {
        tts.send(ttsBuf);
        ttsBuf = '';
      }
    }
    if (ttsBuf) tts.send(ttsBuf);
    tts.flush();

    await tts.done;
    const waitMs = Math.max(0, (S.nextPlayAt - S.audioCtx.currentTime) * 1000);
    await new Promise(r => setTimeout(r, waitMs + 300));

    S.history.push({ role: 'user', content: userText }, { role: 'assistant', content: fullReply });
    sbSave('user', userText);
    sbSave('assistant', fullReply);
    S.exchanges++;
    if (S.exchanges % CFG.SUMMARY_EVERY === 0) generateSummary();

  } catch (e) {
    console.error('pipeline:', e);
    setStatus('發生錯誤', 'err');
    $hizaLine.innerHTML = '';
  } finally {
    setSpeaking(false);
    S.processing = false;
    $micBtn.disabled = false;
    if ($status.classList.contains('on')) setStatus('準備完畢');
  }
}

// ═══════════════════════════════════════════
//  RECORDING
// ═══════════════════════════════════════════
async function startRecording() {
  if (S.recording || S.processing) return;
  stopAllAudio();
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });
    S.chunks = [];
    S.mediaRec = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
    S.mediaRec.ondataavailable = e => { if (e.data.size > 0) S.chunks.push(e.data); };
    S.mediaRec.start(100);
    S.recording = true;
    $micBtn.classList.add('rec');
    setStatus('聆聽中…', 'on');
  } catch (e) { console.error('mic:', e); setStatus('麥克風錯誤', 'err'); }
}

function stopRecording() {
  if (!S.recording || !S.mediaRec) return Promise.resolve(null);
  S.recording = false;
  $micBtn.classList.remove('rec');
  return new Promise(resolve => {
    S.mediaRec.onstop = () => {
      S.mediaRec.stream.getTracks().forEach(t => t.stop());
      resolve(new Blob(S.chunks, { type: 'audio/webm;codecs=opus' }));
    };
    S.mediaRec.stop();
  });
}

// ═══════════════════════════════════════════
//  BUTTON EVENTS
// ═══════════════════════════════════════════
const onPress   = e => { e.preventDefault(); startRecording(); };
const onRelease = e => { e.preventDefault(); if (S.recording) pipeline(); };
$micBtn.addEventListener('mousedown',   onPress);
$micBtn.addEventListener('mouseup',     onRelease);
$micBtn.addEventListener('mouseleave',  onRelease);
$micBtn.addEventListener('touchstart',  onPress,   { passive: false });
$micBtn.addEventListener('touchend',    onRelease, { passive: false });
$micBtn.addEventListener('touchcancel', onRelease, { passive: false });

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
$enterBtn.addEventListener('click', async () => {
  S.audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
  S.nextPlayAt = 0;
  $overlay.classList.add('fade');
  setTimeout(() => { $overlay.style.display = 'none'; }, 900);
  setStatus('連接中…', 'on');

  // Fetch ElevenLabs credentials from server
  try {
    const cfg = await fetch('/api/el-config').then(r => r.json());
    CFG.EL_KEY   = cfg.apiKey;
    CFG.EL_VOICE = cfg.voiceId;
  } catch (e) { console.warn('el-config:', e); }

  if (!CFG.EL_KEY || !CFG.EL_VOICE) {
    setStatus('請設定 Vercel 環境變數', 'err');
    $hizaLine.textContent = '尚未設定 API 金鑰。請在 Vercel 加入環境變數後重新部署。';
    $micBtn.disabled = false;
    return;
  }

  await sbInit();

  scheduleBlink(); // start idle blink loop

  if (S.history.length === 0) {
    await playFirstMessage();
  } else {
    const last = [...S.history].reverse().find(m => m.role === 'assistant');
    if (last) $hizaLine.textContent = last.content;
    setStatus('準備完畢');
    $micBtn.disabled = false;
  }
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
</script>
